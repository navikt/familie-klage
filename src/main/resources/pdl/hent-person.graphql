query($ident: ID!){
    person: hentPerson(ident: $ident) {
        foedselsdato {
            foedselsdato
            foedselsaar
        }
        adressebeskyttelse {
            gradering
            metadata {
                master
                historisk
            }
        }
        doedsfall {
            doedsdato
        }
        folkeregisterpersonstatus {
            status
            forenkletStatus
            metadata {
                master
                historisk
            }
        }
        kjoenn {
            kjoenn
        }
        navn {
            fornavn
            mellomnavn
            etternavn
            metadata {
                master
                historisk
            }
        }
        vergemaalEllerFremtidsfullmakt {
            embete
            folkeregistermetadata {
                gyldighetstidspunkt
                opphoerstidspunkt
            }
            type
            vergeEllerFullmektig {
                motpartsPersonident
                navn {
                    fornavn
                    mellomnavn
                    etternavn
                }
                omfang
                omfangetErInnenPersonligOmraade
            }
        }
    }
}
